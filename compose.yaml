services:
    laravel.test:
        build:
            context: './vendor/laravel/sail/runtimes/8.5'
            dockerfile: Dockerfile
            args:
                WWWGROUP: '${WWWGROUP}'
        image: 'sail-8.5/app'
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        ports:
            - '${APP_PORT:-80}:80'
            - '${VITE_PORT:-5173}:${VITE_PORT:-5173}'
            - '${AGI_PORT:-4573}:4573'
        environment:
            WWWUSER: '${WWWUSER}'
            LARAVEL_SAIL: 1
            XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-off}'
            XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
            IGNITION_LOCAL_SITES_PATH: '${PWD}'
        volumes:
            - '.:/var/www/html'
        networks:
            - sail
        depends_on:
            - mysql
            - redis
    mysql:
        image: 'mysql:8.4'
        ports:
            - '${FORWARD_DB_PORT:-3306}:3306'
        environment:
            MYSQL_ROOT_PASSWORD: '${DB_PASSWORD}'
            MYSQL_ROOT_HOST: '%'
            MYSQL_DATABASE: '${DB_DATABASE}'
            MYSQL_USER: '${DB_USERNAME}'
            MYSQL_PASSWORD: '${DB_PASSWORD}'
            MYSQL_ALLOW_EMPTY_PASSWORD: 1
            MYSQL_EXTRA_OPTIONS: '${MYSQL_EXTRA_OPTIONS:-}'
        volumes:
            - 'sail-mysql:/var/lib/mysql'
            - './vendor/laravel/sail/database/mysql/create-testing-database.sh:/docker-entrypoint-initdb.d/10-create-testing-database.sh'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - mysqladmin
                - ping
                - '-p${DB_PASSWORD}'
            retries: 3
            timeout: 5s
    redis:
        image: 'redis:alpine'
        ports:
            - '${FORWARD_REDIS_PORT:-6379}:6379'
        volumes:
            - 'sail-redis:/data'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - redis-cli
                - ping
            retries: 3
            timeout: 5s
    worker:
        image: 'sail-8.5/app'
        command: /usr/bin/supervisord -c /etc/supervisor/conf.d/supervisord.conf
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        environment:
            WWWUSER: '${WWWUSER}'
            LARAVEL_SAIL: 1
        volumes:
            - '.:/var/www/html'
            - './docker/supervisor/supervisord.conf:/etc/supervisor/conf.d/supervisord.conf'
        networks:
            - sail
        depends_on:
            - mysql
            - redis
            - laravel.test
    asterisk:
        build:
            context: './docker/asterisk'
            dockerfile: Dockerfile
        image: 'rswitch/asterisk:21'
        ports:
            - '${SIP_PORT:-5060}:5060/udp'
            - '${SIP_PORT:-5060}:5060/tcp'
            - '${SIP_TLS_PORT:-5061}:5061/tcp'
        environment:
            ODBC_HOST: mysql
            ODBC_PORT: 3306
            ODBC_DATABASE: '${DB_DATABASE}'
            ODBC_USERNAME: '${DB_USERNAME}'
            ODBC_PASSWORD: '${DB_PASSWORD}'
        volumes:
            - './docker/asterisk/conf/asterisk.conf:/etc/asterisk/asterisk.conf'
            - './docker/asterisk/conf/modules.conf:/etc/asterisk/modules.conf'
            - './docker/asterisk/conf/pjsip.conf:/etc/asterisk/pjsip.conf'
            - './docker/asterisk/conf/pjsip_trunks.conf:/etc/asterisk/pjsip_trunks.conf'
            - './docker/asterisk/conf/extensions.conf:/etc/asterisk/extensions.conf'
            - './docker/asterisk/conf/extconfig.conf:/etc/asterisk/extconfig.conf'
            - './docker/asterisk/conf/res_odbc.conf:/etc/asterisk/res_odbc.conf'
            - './docker/asterisk/conf/logger.conf:/etc/asterisk/logger.conf'
            - './docker/asterisk/conf/manager.conf:/etc/asterisk/manager.conf'
        networks:
            - sail
        depends_on:
            mysql:
                condition: service_healthy
networks:
    sail:
        driver: bridge
volumes:
    sail-mysql:
        driver: local
    sail-redis:
        driver: local
