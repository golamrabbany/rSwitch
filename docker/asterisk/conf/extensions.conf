; rSwitch Dialplan
; All SIP accounts use context [from-internal]
; All incoming trunks use context [from-trunk]
; AGI handles routing, billing, and security checks

[general]
static=yes
writeprotect=yes
clearglobalvars=yes

[globals]
; AGI server address (will be Laravel FastAGI)
AGI_HOST=laravel.test
AGI_PORT=4573

; --- Context: Internal calls from SIP accounts ---
[from-internal]
; Route outbound calls via AGI
exten => _X.,1,NoOp(Outbound call from ${CALLERID(all)} to ${EXTEN})
 same => n,Set(CHANNEL(language)=en)
 ; AGI will handle: auth check, rate lookup, balance check, trunk selection, CLI manipulation
 ; same => n,AGI(agi://${AGI_HOST}:${AGI_PORT}/route_outbound)
 ; same => n,GotoIf($["${AGISTATUS}" != "SUCCESS"]?error)

 ; Placeholder: echo test (remove when AGI is ready)
 same => n,Answer()
 same => n,Playback(tt-weasels)
 same => n,Hangup()

 same => n(error),Playback(an-error-has-occurred)
 same => n,Hangup()

; --- Context: Incoming calls from trunks ---
[from-trunk]
exten => _X.,1,NoOp(Inbound call from ${CALLERID(all)} to DID ${EXTEN})
 same => n,Set(CHANNEL(language)=en)
 ; AGI will handle: DID lookup, route to SIP account or ring group
 ; same => n,AGI(agi://${AGI_HOST}:${AGI_PORT}/route_inbound)
 ; same => n,GotoIf($["${AGISTATUS}" != "SUCCESS"]?error)

 ; Placeholder
 same => n,Answer()
 same => n,Playback(tt-weasels)
 same => n,Hangup()

 same => n(error),Playback(an-error-has-occurred)
 same => n,Hangup()

; --- Context: Echo test for SIP account testing ---
[echo-test]
exten => 600,1,NoOp(Echo test for ${CALLERID(all)})
 same => n,Answer()
 same => n,Playback(demo-echotest)
 same => n,Echo()
 same => n,Playback(demo-echodone)
 same => n,Hangup()
