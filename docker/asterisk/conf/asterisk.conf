[directories]
astetcdir => /etc/asterisk
astmoddir => /usr/lib/asterisk/modules
astvarlibdir => /var/lib/asterisk
astdbdir => /var/lib/asterisk
astkeydir => /var/lib/asterisk
astdatadir => /var/lib/asterisk
astagidir => /var/lib/asterisk/agi-bin
astspooldir => /var/spool/asterisk
astrundir => /var/run/asterisk
astlogdir => /var/log/asterisk

[options]
runuser = asterisk
rungroup = asterisk
verbose = 1
debug = 0
; Performance: run at high priority for better real-time scheduling
highpriority = yes
; Allow up to 1200 concurrent calls
maxcalls = 1200
; Stop accepting calls if system load > 90%
maxload = 0.9
; Recording: only if enabled per-account
cache_record_files = yes
record_cache_dir = /tmp
transmit_silence_during_record = yes
transmit_silence = yes
hideconnect = yes
; Performance: reduce internal processing overhead
live_dangerously = no
; Reduce logging overhead at high call volume
timestamp = yes
