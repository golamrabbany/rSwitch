; rSwitch PJSIP Configuration
; SIP endpoints are loaded from MySQL via Realtime (extconfig.conf)
; This file defines transports and global settings only.

[global]
type=global
max_initial_qualify_time=4
keep_alive_interval=30
default_outbound_endpoint=

; --- UDP Transport ---
[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
local_net=172.16.0.0/12
local_net=10.0.0.0/8
local_net=192.168.0.0/16
external_media_address=
external_signaling_address=

; --- TCP Transport ---
[transport-tcp]
type=transport
protocol=tcp
bind=0.0.0.0:5060

; --- TLS Transport (uncomment when certificates are ready) ---
; [transport-tls]
; type=transport
; protocol=tls
; bind=0.0.0.0:5061
; cert_file=/etc/asterisk/keys/asterisk.pem
; ca_list_file=/etc/asterisk/keys/ca.crt
; method=tlsv1_2

; Trunk endpoints will be auto-generated by Laravel into pjsip_trunks.conf
#include pjsip_trunks.conf
