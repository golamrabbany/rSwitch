[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:agi-server]
command=php /var/www/html/artisan agi:serve
user=sail
autostart=true
autorestart=true
stopwaitsecs=10
stdout_logfile=/var/www/html/storage/logs/agi-server.log
stdout_logfile_maxbytes=10MB
stderr_logfile=/var/www/html/storage/logs/agi-server-error.log
stderr_logfile_maxbytes=5MB

[program:queue-worker]
command=php /var/www/html/artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
user=sail
autostart=true
autorestart=true
stopwaitsecs=10
numprocs=2
process_name=%(program_name)s_%(process_num)02d
stdout_logfile=/var/www/html/storage/logs/queue-worker.log
stdout_logfile_maxbytes=10MB
stderr_logfile=/var/www/html/storage/logs/queue-worker-error.log
stderr_logfile_maxbytes=5MB

[program:scheduler]
command=sh -c "while true; do php /var/www/html/artisan schedule:run --verbose --no-interaction >> /var/www/html/storage/logs/scheduler.log 2>&1; sleep 60; done"
user=sail
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
